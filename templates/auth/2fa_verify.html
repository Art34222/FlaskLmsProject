{% extends "base.html" %}
{% block title %}Проверка 2FA — EduOnline{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4">Двухфакторная аутентификация</h2>
        <p>Введите 6-значный код из Google Authenticator.</p>
        <form method="POST">
            <div class="mb-3">
                <input type="text" name="code" class="form-control form-control-lg text-center"
                       maxlength="6" pattern="\d{6}" required placeholder="000000" autofocus>
            </div>
            <button class="btn btn-primary w-100">Подтвердить</button>
        </form>
    </div>
</div>
{% endblock %}
