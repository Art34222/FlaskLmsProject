{% extends "base.html" %}
{% block title %}Регистрация — EduOnline{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4">Регистрация</h2>
        <form method="POST" id="registerForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" required maxlength="100">
            </div>
            <div class="mb-3">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" id="username" name="username" class="form-control" required maxlength="50">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" name="password" id="password"
                       class="form-control" required minlength="8" maxlength="100">
            </div>
            <div class="mb-3">
                <label for="passwordConfirm" class="form-label">Повторите пароль</label>
                <input type="password" name="password_confirm" id="passwordConfirm"
                       class="form-control" required minlength="8" maxlength="100">
                <div class="invalid-feedback">Пароли не совпадают.</div>
            </div>
            <div class="mb-3">
                <label for="role" class="form-label">Роль</label>
                <select name="role" id="role" class="form-select">
                    <option value="student">Ученик</option>
                    <option value="teacher">Учитель</option>
                </select>
            </div>
            <button class="btn btn-primary w-100">Зарегистрироваться</button>
        </form>
        <p class="mt-3 text-center">
            Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a>
        </p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const password = document.getElementById('password');
        const confirm = document.getElementById('passwordConfirm');

        function check() {
            if (confirm.value && password.value !== confirm.value) {
                confirm.setCustomValidity('mismatch');
                confirm.classList.add('is-invalid');
            } else {
                confirm.setCustomValidity('');
                confirm.classList.remove('is-invalid');
            }
        }

        password.addEventListener('input', check);
        confirm.addEventListener('input', check);
    });
</script>
{% endblock %}
